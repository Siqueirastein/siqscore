<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SiqScore</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
padding:20px;
font-size:28px;
color:#00ff66;
text-align:center;
}

.tabs{
display:flex;
gap:10px;
padding:15px;
justify-content:center;
}

.tab{
background:#1f2937;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

.tab.active{
background:#00ff66;
color:black;
}

.match{
background:#161b22;
margin:15px;
padding:15px;
border-radius:10px;
}

.odds{
margin-top:10px;
}

.odd{
background:#1f2937;
padding:8px 12px;
border-radius:8px;
margin-right:8px;
display:inline-block;
}

button{
background:#00ff66;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

</style>
</head>

<body>

<header>⚽ SiqScore</header>

<div class="tabs">
<div class="tab active" onclick="trocarLiga('br', this)">Brasileirão</div>
<div class="tab" onclick="trocarLiga('pl', this)">Premier League</div>
<div class="tab" onclick="trocarLiga('laliga', this)">La Liga</div>
</div>

<div id="jogos"></div>

<script>

const jogos = {
br: [
{times:"Palmeiras x Flamengo", hora:"19:30"},
{times:"Corinthians x Grêmio", hora:"21:30"}
],
pl: [
{times:"Arsenal x Liverpool", hora:"17:00"},
{times:"Manchester City x Chelsea", hora:"18:30"}
],
laliga: [
{times:"Real Madrid x Barcelona", hora:"16:00"},
{times:"Atlético x Sevilla", hora:"18:00"}
]
};

// gerar odds aleatórias
function gerarOdds(){
return {
casa: (Math.random()*30+40).toFixed(0),
empate: (Math.random()*20+20).toFixed(0),
fora: (Math.random()*30+20).toFixed(0)
};
}

function trocarLiga(liga, elemento){

let tabs = document.querySelectorAll(".tab");
tabs.forEach(t => t.classList.remove("active"));

elemento.classList.add("active");

mostrarJogos(liga);

}

function mostrarJogos(liga){

let container = document.getElementById("jogos");
container.innerHTML = "";

jogos[liga].forEach(jogo => {

let odds = gerarOdds();

let div = document.createElement("div");
div.className="match";

div.innerHTML = `
<h3>${jogo.times}</h3>
🕒 ${jogo.hora}

<div class="odds">
<span class="odd">1 ${odds.casa}%</span>
<span class="odd">X ${odds.empate}%</span>
<span class="odd">2 ${odds.fora}%</span>
</div>

<button onclick="verDetalhes('${jogo.times}')">
Ver análise
</button>
`;

container.appendChild(div);

});

}

function verDetalhes(jogo){
alert("Análise detalhada de " + jogo + " em breve 🔥");
}

mostrarJogos("br");

</script>

</body>
</html>

<script>
async function atualizarJogos(){

const url='https://v3.football.api-sports.io/fixtures?live=all';

const resposta = await fetch(url,{
headers:{
'x-rapidapi-key':'COLE_SUA_CHAVE_AQUI',
'x-rapidapi-host':'v3.football.api-sports.io'
}
});

const dados = await resposta.json();

if(dados.response.length>0){
let jogo = dados.response[0];

let casa = jogo.teams.home.name;
let fora = jogo.teams.away.name;
let golsCasa = jogo.goals.home ?? 0;
let golsFora = jogo.goals.away ?? 0;


document.getElementById('jogo1').innerText=
`${casa} x ${fora}`;


document.getElementById('odd1').innerText=
`${golsCasa}-${golsFora}`;


document.getElementById('pick1').innerText=
'Jogo ao vivo';

}

}
</script>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SiqScore</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
padding:20px;
font-size:28px;
color:#00ff66;
text-align:center;
}

.tabs{
display:flex;
gap:10px;
padding:15px;
justify-content:center;
}

.tab{
background:#1f2937;
padding:10px 15px;
border-radius:20px;
cursor:pointer;
}

.tab.active{
background:#00ff66;
color:black;
}

.match{
background:#161b22;
margin:15px;
padding:15px;
border-radius:10px;
}

button{
background:#00ff66;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

</style>
</head>

<body>

<header>⚽ SiqScore</header>

<div class="tabs">
<div class="tab active" onclick="trocarLiga('br', this)">Brasileirão</div>
<div class="tab" onclick="trocarLiga('pl', this)">Premier League</div>
<div class="tab" onclick="trocarLiga('laliga', this)">La Liga</div>
</div>

<div id="jogos"></div>

<script>

const jogos = {
br: [
"Palmeiras x Flamengo",
"Corinthians x Grêmio"
],
pl: [
"Arsenal x Liverpool",
"Manchester City x Chelsea"
],
laliga: [
"Real Madrid x Barcelona",
"Atlético x Sevilla"
]
};

function trocarLiga(liga, elemento){

let tabs = document.querySelectorAll(".tab");
tabs.forEach(t => t.classList.remove("active"));

elemento.classList.add("active");

mostrarJogos(liga);

}

function mostrarJogos(liga){

let container = document.getElementById("jogos");
container.innerHTML = "";

jogos[liga].forEach(jogo => {

let div = document.createElement("div");
div.className="match";

div.innerHTML = `
<h3>${jogo}</h3>

<div>
<span>1 45%</span> |
<span>X 30%</span> |
<span>2 25%</span>
</div>

<br>

<button onclick="alert('Análise completa em breve')">
Ver Probabilidades
</button>
`;

container.appendChild(div);

});

}

// carregar padrão
mostrarJogos("br");

</script>

</body>
</html>

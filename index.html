<body>

<h1>SiqScore</h1>

<div class="btns">
  <button onclick="carregarJogos('today')">Hoje</button>
  <button onclick="carregarJogos('tomorrow')">Amanhã</button>
</div>

<div id="jogos"></div>

<script>
const API_KEY = "7ff170775b65df8153a04c39d74efaad";

async function carregarJogos(tipo){

  let data = new Date();

  if(tipo === "tomorrow"){
    data.setDate(data.getDate()+1);
  }

  let dataFormatada = data.toISOString().split("T")[0];

  const res = await fetch(`/api/jogos?date=${dataFormatada}`);
    }
  });

  const json = await res.json();

  const jogosDiv = document.getElementById("jogos");
  jogosDiv.innerHTML = "";

  json.response.slice(0,10).forEach(jogo => {

    jogosDiv.innerHTML += `
      <div class="card">

    `;

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SiqScore</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
padding:20px;
background:#111827;
font-size:25px;
color:#00ff66;
text-align:center;
}

.league{
margin-top:20px;
padding:10px;
background:#1f2937;
font-weight:bold;
}

.match{
padding:15px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<header>⚽ SiqScore</header>

<div id="jogos"></div>

<script>

const API_KEY = "123abc456xyz789";

fetch("https://v3.football.api-sports.io/fixtures?date=2024-06-01", {
method: "GET",
headers: {
"x-apisports-key": API_KEY
}
})
.then(res => res.json())
.then(data => {

let container = document.getElementById("jogos");

data.response.forEach(jogo => {

let liga = jogo.league.name;
let time1 = jogo.teams.home.name;
let time2 = jogo.teams.away.name;
let hora = jogo.fixture.date.substring(11,16);

let div = document.createElement("div");
div.className="match";

div.innerHTML = `
<b>${liga}</b><br>
${time1} vs ${time2}<br>
🕒 ${hora}
`;

container.appendChild(div);

});

});

</script>

</body>
</html>
